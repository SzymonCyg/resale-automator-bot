<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <title>Vinted Manager</title>
    <style>
      :root { color-scheme: dark; }
      body { width: 300px; margin: 0; padding: 16px; font-family: -apple-system, system-ui, sans-serif; background: #1a1f2b; color: #e6edf3; }
      h1 { font-size: 16px; margin: 0 0 6px; }
      p { font-size: 12px; color: #98a4b3; margin: 0 0 12px; line-height: 1.45; }
      button { width: 100%; padding: 9px 10px; border-radius: 6px; border: none; background: #5eead4; color: #0b1220; font: inherit; font-weight: 600; cursor: pointer; margin-top: 8px; }
      button.secondary { background: transparent; color: #98a4b3; border: 1px solid #2d3648; }
    </style>
  </head>
  <body>
    <h1>Vinted Manager</h1>
    <p>Otwórz Vinted i kliknij pasek po prawej — panel rozwinie się na cały ekran. Logowanie odbywa się w panelu.</p>
    <button id="openVinted">Otwórz Vinted</button>
    <button class="secondary" id="signout">Wyloguj</button>
    <script src="popup.js"></script>
  </body>
</html>
