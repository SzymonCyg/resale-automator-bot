<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <title>Vinted Manager</title>
    <style>
      :root { color-scheme: dark; }
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, system-ui, sans-serif;
        background: #1a1f2b;
        color: #e6edf3;
      }
      h1 { font-size: 16px; margin: 0 0 4px; }
      p { font-size: 12px; color: #98a4b3; margin: 0 0 12px; }
      input, button {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #2d3648;
        background: #232a39;
        color: #e6edf3;
        font: inherit;
        box-sizing: border-box;
      }
      button { background: #5eead4; color: #0b1220; border: none; font-weight: 600; cursor: pointer; margin-top: 8px; }
      button.secondary { background: transparent; color: #98a4b3; border: 1px solid #2d3648; }
      .row { margin-bottom: 10px; }
      .status { padding: 8px; border-radius: 6px; font-size: 12px; }
      .ok { background: rgba(94, 234, 212, 0.15); color: #5eead4; }
      .err { background: rgba(248, 113, 113, 0.15); color: #f87171; }
      label { font-size: 11px; color: #98a4b3; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
  </head>
  <body>
    <h1>Vinted Manager</h1>
    <p id="subtitle">Sparuj wtyczkę z panelem.</p>

    <div id="unpaired">
      <div class="row">
        <label for="panelUrl">URL panelu</label>
        <input id="panelUrl" placeholder="https://twoj-panel.lovable.app" />
      </div>
      <div class="row">
        <label for="code">Kod parowania (6 znaków)</label>
        <input id="code" maxlength="6" style="text-transform: uppercase; letter-spacing: 0.3em; text-align: center" />
      </div>
      <button id="pair">Sparuj</button>
      <div id="msg"></div>
    </div>

    <div id="paired" style="display: none">
      <div class="status ok" id="pairedStatus">✓ Sparowane</div>
      <p style="margin-top: 12px">
        Otwórz vinted.pl (lub inny kraj) zalogowany na konto, którym chcesz zarządzać.
        Wtyczka automatycznie zsynchronizuje przedmioty.
      </p>
      <button class="secondary" id="unpair">Rozłącz</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
